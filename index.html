<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axtro Technologies — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --midnight: #050B18;
    --deep-navy: #080F22;
    --steel: #3A4A6B;
    --mist: #8898C4;
    --cloud: #C4CFEC;
    --white: #F0F4FF;
    --cyan: #00E5FF;
    --cyan-dim: rgba(0, 229, 255, 0.12);
    --cyan-glow: rgba(0, 229, 255, 0.4);
    --pulse: rgba(0, 229, 255, 0.08);
  }

  html, body {
    height: 100%;
    background: var(--midnight);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ── STARFIELD CANVAS ── */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── GRID OVERLAY ── */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background-image:
      linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    pointer-events: none;
  }

  /* ── MAIN LAYOUT ── */
  .scene {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 0;
  }

  /* ── LOGO MARK ── */
  .logomark {
    position: relative;
    width: 80px;
    height: 80px;
    margin-bottom: 2.5rem;
  }

  .orbit-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid rgba(0, 229, 255, 0.25);
    animation: orbit-spin 8s linear infinite;
  }

  .orbit-ring::after {
    content: '';
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 7px;
    height: 7px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 12px 4px var(--cyan-glow);
  }

  .orbit-ring-2 {
    position: absolute;
    inset: -24px;
    border-radius: 50%;
    border: 1px solid rgba(0, 229, 255, 0.1);
    animation: orbit-spin 14s linear infinite reverse;
  }

  .orbit-ring-2::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 50%;
    transform: translateX(-50%);
    width: 5px;
    height: 5px;
    background: rgba(0, 229, 255, 0.6);
    border-radius: 50%;
    box-shadow: 0 0 8px 3px var(--cyan-glow);
  }

  @keyframes orbit-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .logo-hex {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0D1F3C 0%, #050B18 100%);
    border: 1px solid rgba(0, 229, 255, 0.2);
    border-radius: 18px;
    box-shadow: 0 0 40px rgba(0, 229, 255, 0.08), inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
    z-index: 2;
  }

  .logo-hex svg {
    width: 44px;
    height: 44px;
  }

  /* ── EYEBROW ── */
  .eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 1.25rem;
    opacity: 0;
    animation: fade-up 0.8s ease 0.3s forwards;
  }

  /* ── WORDMARK ── */
  .wordmark {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(3.5rem, 10vw, 7.5rem);
    font-weight: 700;
    line-height: 0.92;
    letter-spacing: -0.03em;
    color: var(--white);
    text-align: center;
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fade-up 0.8s ease 0.5s forwards;
  }

  .wordmark .a-letter {
    color: var(--cyan);
    text-shadow: 0 0 60px rgba(0, 229, 255, 0.5);
    display: inline-block;
  }

  .wordmark .tech {
    display: block;
    font-size: clamp(1.1rem, 3.2vw, 2.2rem);
    font-weight: 300;
    letter-spacing: 0.22em;
    color: var(--mist);
    margin-top: 0.4rem;
    text-transform: uppercase;
  }

  /* ── TAGLINE ── */
  .tagline {
    font-size: clamp(0.85rem, 2vw, 1.05rem);
    font-weight: 300;
    color: var(--mist);
    text-align: center;
    max-width: 420px;
    line-height: 1.7;
    margin-top: 1.8rem;
    margin-bottom: 2.8rem;
    opacity: 0;
    animation: fade-up 0.8s ease 0.7s forwards;
  }

  /* ── NOTIFY FORM ── */
  .notify-form {
    display: flex;
    gap: 0;
    width: 100%;
    max-width: 380px;
    opacity: 0;
    animation: fade-up 0.8s ease 0.9s forwards;
  }

  .notify-form input[type="email"] {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--steel);
    border-right: none;
    border-radius: 8px 0 0 8px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }

  .notify-form input[type="email"]::placeholder { color: var(--steel); }

  .notify-form input[type="email"]:focus {
    border-color: rgba(0, 229, 255, 0.45);
    background: rgba(0, 229, 255, 0.04);
  }

  .notify-form button {
    background: var(--cyan);
    color: var(--midnight);
    border: none;
    border-radius: 0 8px 8px 0;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 0.75rem 1.25rem;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    white-space: nowrap;
  }

  .notify-form button:hover {
    background: #33ECFF;
    box-shadow: 0 0 20px rgba(0, 229, 255, 0.35);
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-top: 3rem;
    opacity: 0;
    animation: fade-up 0.8s ease 1.1s forwards;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--steel);
    letter-spacing: 0.04em;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--cyan);
    animation: pulse-dot 2.5s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .status-divider {
    width: 1px;
    height: 14px;
    background: var(--steel);
    opacity: 0.4;
  }



  /* ── HORIZONTAL LINE ── */
  .rule {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, var(--steel), transparent);
    opacity: 0;
    animation: fade-up 0.8s ease 0.9s forwards;
    margin: 1.5rem 0;
  }

  /* ── ANIMATIONS ── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── SUCCESS MESSAGE ── */
  .success-msg {
    display: none;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--cyan);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    max-width: 380px;
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid rgba(0, 229, 255, 0.2);
    border-radius: 8px;
    background: rgba(0, 229, 255, 0.05);
  }

  .success-msg.show { display: flex; }

  /* ── REDUCED MOTION ── */
  @media (prefers-reduced-motion: reduce) {
    .orbit-ring, .orbit-ring-2, .status-dot { animation: none; }
    .wordmark, .eyebrow, .tagline, .notify-form, .status-bar, .bottom-links, .rule, .success-msg { animation: none; opacity: 1; }
  }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .status-bar { flex-direction: column; gap: 0.5rem; }
    .status-divider { display: none; }
    .notify-form { max-width: 100%; }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="grid-overlay"></div>

<main class="scene">

  <!-- Logomark with orbit rings -->
  <div class="logomark">
    <div class="orbit-ring-2"></div>
    <div class="orbit-ring"></div>
    <div class="logo-hex">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Stylised "A" as geometric lightning bolt / arrow -->
        <polygon points="22,4 38,38 30,38 22,20 14,38 6,38" fill="#00E5FF" opacity="0.15"/>
        <polygon points="22,4 38,38 30,38 22,20 14,38 6,38" fill="none" stroke="#00E5FF" stroke-width="1.5" stroke-linejoin="round"/>
        <line x1="11" y1="28" x2="33" y2="28" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round"/>
        <!-- small dot at apex -->
        <circle cx="22" cy="4" r="2" fill="#00E5FF"/>
      </svg>
    </div>
  </div>

  <span class="eyebrow">Under Construction</span>

  <h1 class="wordmark">
    <span class="a-letter">A</span>xtro
    <span class="tech">Technologies</span>
  </h1>

  <p class="tagline">
    We're engineering something remarkable.<br>
    The future arrives soon.
  </p>

  <div class="rule"></div>

  <!-- Notify form -->
  <div class="notify-form" id="formWrapper">
    <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email">
    <button onclick="handleNotify()">Notify Me</button>
  </div>

  <div class="success-msg" id="successMsg">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#00E5FF" stroke-width="1.2"/><polyline points="5,8.5 7,10.5 11,6" stroke="#00E5FF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    You're on the list. We'll be in touch.
  </div>

  <!-- Status indicators -->
  <div class="status-bar">
    <div class="status-item">Launch in Progress</div>
    <div class="status-divider"></div>
    <div class="status-item">2026 · Axtro Technologies</div>
  </div>

</main>



<script>
// ── STARFIELD ──
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkStar() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.2,
      alpha: Math.random() * 0.7 + 0.1,
      speed: Math.random() * 0.004 + 0.002,
      phase: Math.random() * Math.PI * 2,
    };
  }

  function init() {
    resize();
    stars = Array.from({ length: 200 }, mkStar);
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      const a = s.alpha * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(192,210,255,${a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init();
  requestAnimationFrame(draw);
})();

// ── FORM ──
function handleNotify() {
  const input = document.getElementById('emailInput');
  const val = input.value.trim();
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!re.test(val)) {
    input.style.borderColor = 'rgba(255,80,80,0.6)';
    input.focus();
    setTimeout(() => { input.style.borderColor = ''; }, 1500);
    return;
  }
  document.getElementById('formWrapper').style.display = 'none';
  const msg = document.getElementById('successMsg');
  msg.classList.add('show');
}

document.getElementById('emailInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleNotify();
});
</script>
</body>
</html>
